<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Warriors - Our Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Arial', 'Aptos', sans-serif;
    background-color: #f4f4f4;
    color: #333;
    line-height: 1.6;
  }


  .navbar {
    background-color: #003366;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .logo a {
    color: #fff;
    font-size: 1.5rem;
    font-weight: bold;
    text-decoration: none;
  }

  .nav-links a {
    color: #fff;
    text-decoration: none;
    margin-left: 1.5rem;
    padding: 0.5rem 0;
    transition: color 0.3s;
  }

  .nav-links a:hover {
    color: #ddd;
  }

  
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }


  .services-hero {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    margin-bottom: 2rem;
  }

  .services-hero img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.3s;
  }

  
  .overlay-list {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 51, 102, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  
  .services-list {
    list-style: none;
    text-align: center;
    padding: 1.5rem;
    max-width: 90%;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    border-left: 5px solid #ff9900; /
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .services-list li {
    font-size: 1.6rem;
    font-weight: bold;
    color: white;
    margin: 1rem 0;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
  }

  .services-list li:last-child {
    border-bottom: none;
  }

  .services-list li i {
    font-size: 1.8rem;
    color: #ff9900;
    width: 40px;
  }

  
  footer {
    background-color: #003366;
    color: #ccc;
    text-align: center;
    padding: 1.5rem;
    margin-top: 3rem;
  }

  .social-icons a {
    color: #ccc;
    font-size: 1.5rem;
    margin: 0 0.75rem;
    transition: color 0.3s;
  }

  .social-icons a:hover {
    color: #ff9900;
  }


  @media (max-width: 768px) {
    .navbar {
      flex-direction: column;
      gap: 0.8rem;
    }
    .nav-links a {
      margin: 0 0.8rem;
    }
    .services-list li {
      font-size: 1.2rem;
      flex-wrap: wrap;
    }
    .services-list li i {
      font-size: 1.4rem;
      width: 30px;
    }
    .overlay-list {
      background: rgba(0, 51, 102, 0.85);
    }
  }

  @media (max-width: 480px) {
    .services-list li {
      font-size: 1rem;
      text-align: left;
      justify-content: flex-start;
    }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><a href="index.html">Tech Warriors</a></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main>
  <h1 style="text-align: center; margin-bottom: 1.5rem; color: #003366;">Our Premium Services</h1>


  <div class="services-hero">

    <img src="images/services.jpg" alt="Tech Warriors providing IT solutions">
    <div class="overlay-list">
      <ul class="services-list">
        <li><i class="fas fa-laptop-code"></i> Computer Repairs</li>
        <li><i class="fas fa-download"></i> Software Installation</li>
        <li><i class="fas fa-network-wired"></i> Network Setup</li>
        <li><i class="fas fa-code"></i> Website Development</li>
      </ul>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 Tech Warriors | Affordable IT Solutions for Everyone</p>
  <div class="social-icons">
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
  </div>
</footer>


<script src="js/script.js"></script>
</body>
</html>
