<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Warriors - Contact Us</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Arial', 'Aptos', sans-serif;
    background-color: #f4f4f4;
    color: #333;
    line-height: 1.6;
  }

  /* Navigation Bar */
  .navbar {
    background-color: #003366;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .logo a {
    color: #fff;
    font-size: 1.5rem;
    font-weight: bold;
    text-decoration: none;
  }

  .nav-links a {
    color: #fff;
    text-decoration: none;
    margin-left: 1.5rem;
    padding: 0.5rem 0;
    transition: color 0.3s;
  }

  .nav-links a:hover {
    color: #ddd;
  }

  /* Main container */
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  h1 {
    text-align: center;
    margin-bottom: 1.5rem;
    color: #003366;
  }

  /* Image with text overlay */
  .contact-hero {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    margin-bottom: 2rem;
  }

  .contact-hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Overlay that covers the image */
  .overlay-contact {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 51, 102, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  /* Contact card styling inside the picture */
  .contact-card {
    text-align: center;
    background: rgba(255, 255, 255, 0.15);
    padding: 2rem 2.5rem;
    border-radius: 20px;
    border-left: 5px solid #ff9900;
    border-right: 5px solid #ff9900;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
  }

  .contact-card h2 {
    color: white;
    font-size: 2rem;
    margin-bottom: 1.5rem;
    letter-spacing: 1px;
  }

  .contact-info {
    list-style: none;
  }

  .contact-info li {
    font-size: 1.4rem;
    margin: 1rem 0;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    color: white;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    border-radius: 50px;
    transition: transform 0.2s;
  }

  .contact-info li:hover {
    transform: scale(1.02);
    background: rgba(0,0,0,0.6);
  }

  .contact-info li i {
    font-size: 1.8rem;
    color: #ff9900;
    width: 40px;
  }

  /* Footer */
  footer {
    background-color: #222;
    color: #ccc;
    text-align: center;
    padding: 1.5rem;
    margin-top: 2rem;
  }

  .social-icons a {
    color: #ccc;
    font-size: 1.5rem;
    margin: 0 0.75rem;
    transition: color 0.3s;
  }

  .social-icons a:hover {
    color: #ff9900;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .navbar {
      flex-direction: column;
      gap: 0.8rem;
    }
    .nav-links a {
      margin: 0 0.8rem;
    }
    .contact-card {
      padding: 1rem 1.2rem;
      margin: 0 0.5rem;
    }
    .contact-card h2 {
      font-size: 1.3rem;
    }
    .contact-info li {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      gap: 8px;
    }
    .contact-info li i {
      font-size: 1.3rem;
      width: 30px;
    }
  }

  @media (max-width: 480px) {
    .contact-info li {
      font-size: 0.85rem;
      flex-wrap: wrap;
      text-align: center;
    }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><a href="index.html">Tech Warriors</a></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="enquiry.html">Enquiry</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main>
  <h1>Contact Us</h1>

  <!-- Picture + Contact info overlay (image unchanged) -->
  <div class="contact-hero">
    <!-- Your exact image - NOT replaced -->
    <img src="images/contact.jpg" alt="Contact">
    <div class="overlay-contact">
      <div class="contact-card">
        <h2><i class="fas fa-headset"></i> Get In Touch</h2>
        <ul class="contact-info">
          <li><i class="fas fa-envelope"></i> Email: techwarri@gmail.za</li>
          <li><i class="fas fa-phone-alt"></i> Phone: 0742107161</li>
        </ul>
      </div>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 Tech Warriors | Reliable IT Solutions</p>
  <div class="social-icons">
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
  </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
